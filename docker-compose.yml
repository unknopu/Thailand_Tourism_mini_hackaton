services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/chroma_db:/app/chroma_db
      - ./backend/embed_places.py:/app/embed_places.py
    env_file:
      - ./backend/.env
    command: >
      sh -c "
      if [ ! -d /app/chroma_db ] || [ -z \"$(ls -A /app/chroma_db 2>/dev/null)\" ]; then
        echo 'No chroma_db found, running embedding...';
        python embed_places.py;
      else
        echo 'chroma_db exists, skipping embedding';
      fi &&
      uvicorn src.main:app --host 0.0.0.0 --port 8000
      "
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend
